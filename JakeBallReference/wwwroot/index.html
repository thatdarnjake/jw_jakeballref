<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jake-Ball Reference</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <h1>Jake-Ball Reference</h1>
                <span class="tagline">a basketball dot com scraper</span>
            </div>
            <div class="header-controls">
                <div class="filter-group">
                    <label>Compare Mode</label>
                    <select id="compareMode">
                        <option value="career">Career Totals</option>
                        <option value="season">Specific Season</option>
                        <option value="careerYear">Career Year #</option>
                        <option value="seasonRange">Season Range</option>
                        <option value="careerYearRange">Career Year Range</option>
                    </select>
                </div>
                <div class="filter-group filter-inputs" id="filterInputs" style="display:none;">
                    <input type="text" id="filterValue1" placeholder="e.g. 2022-23">
                    <span id="filterRangeSep" style="display:none;">to</span>
                    <input type="text" id="filterValue2" placeholder="e.g. 2023-24" style="display:none;">
                </div>
                <button id="applyFilter" class="btn-apply" style="display:none;">Apply</button>
                <div class="stat-type-toggle">
                    <button class="stat-tab active" data-table="perGame">Per Game</button>
                    <button class="stat-tab" data-table="totals">Totals</button>
                    <button class="stat-tab" data-table="advanced">Advanced</button>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div id="playerColumns" class="player-columns">
            <!-- Player columns render here -->
        </div>
        <button id="addPlayerBtn" class="add-player-btn" title="Add player (max 5)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            Add Player
        </button>
    </main>

    <div id="searchModal" class="modal" style="display:none;">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <h2>Search Player</h2>
            <input type="text" id="searchInput" placeholder="Type a player name..." autocomplete="off">
            <div id="searchResults" class="search-results"></div>
            <button class="modal-close" id="closeModal">&times;</button>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
